<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Weekly Markets">
<title>Weekly Markets</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f2;
    --bg3: #eeecea;
    --border: rgba(0,0,0,0.11);
    --border2: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b97;
    --pos: #1a7f4b;
    --neg: #b91c1c;
    --neu: #6b6b67;
    --brvm-bg: #eaf3de;
    --brvm-text: #3b6d11;
    --accent: #1a1a18;
    --radius: 12px;
    --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #242422;
      --bg3: #2d2d2a;
      --border: rgba(255,255,255,0.09);
      --border2: rgba(255,255,255,0.18);
      --text: #f0efed;
      --text2: #a0a09c;
      --text3: #6b6b67;
      --brvm-bg: #17340a;
      --brvm-text: #97c459;
      --accent: #f0efed;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }
  .page { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  /* HEADER */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.75rem; gap: 12px; flex-wrap: wrap; }
  .header h1 { font-size: 21px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .week-pill { font-size: 11px; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: 20px; padding: 5px 12px; color: var(--text2); white-space: nowrap; align-self: flex-start; margin-top: 2px; }

  /* TABS */
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { padding: 9px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2.5px solid transparent; color: var(--text3); margin-bottom: -1px; white-space: nowrap; transition: color 0.15s; user-select: none; }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SECTION LABEL */
  .slabel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 0.85rem; }

  /* TABLE CARD */
  .card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; margin-bottom: 1.5rem; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--bg2); padding: 7px 11px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text3); border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  tbody td { padding: 11px 11px; border-bottom: 0.5px solid var(--border); vertical-align: top; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--bg2); }

  /* CELL CONTENT */
  .rank { font-size: 11px; color: var(--text3); font-weight: 600; }
  .co-name { font-weight: 700; font-size: 13px; color: var(--text); }
  .co-sector { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .co-mcap { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .price-val { font-weight: 600; font-size: 13px; }
  .exch { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .prev { font-size: 12px; color: var(--text2); }
  .pos { color: var(--pos); font-weight: 700; font-size: 12px; }
  .neg { color: var(--neg); font-weight: 700; font-size: 12px; }
  .neu { color: var(--neu); font-size: 12px; }
  .news-txt { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .brvm-pill { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; background: var(--brvm-bg); color: var(--brvm-text); margin-top: 4px; }

  /* SNAPSHOT */
  .snap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .snap-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 15px; }
  .snap-card-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 11px; }
  .snap-row { display: flex; align-items: baseline; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
  .snap-row:last-child { border-bottom: none; }
  .snap-n { font-size: 10px; color: var(--text3); min-width: 14px; font-weight: 600; }
  .snap-co { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; }
  .snap-val { font-size: 11px; color: var(--text2); white-space: nowrap; }

  /* FOOTER */
  .footer { margin-top: 2.5rem; padding-top: 1rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text3); line-height: 1.8; text-align: center; }
  .footer strong { color: var(--text2); }

  /* LOADING / ERROR */
  .status { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }
  .status .icon { font-size: 32px; margin-bottom: 8px; }

  /* MOBILE */
  @media (max-width: 540px) {
    .page { padding: 1rem 0.75rem 3rem; }
    table { font-size: 12px; }
    thead th { padding: 6px 8px; font-size: 9px; }
    tbody td { padding: 9px 8px; }
    .co-name { font-size: 12px; }
    .news-txt { font-size: 11px; }
    .snap-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div>
      <h1>📈 Weekly Markets</h1>
      <p>Global & African top companies · BRVM priority</p>
    </div>
    <div class="week-pill" id="week-label">Loading…</div>
  </div>

  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('global',this)">🌍 Global Top 5</div>
    <div class="tab" onclick="switchTab('africa',this)">🌱 Africa · BRVM</div>
    <div class="tab" onclick="switchTab('snap',this)">⚡ Snapshot</div>
  </div>

  <div class="tab-content active" id="tab-global">
    <p class="slabel" id="global-label"></p>
    <div class="card" id="global-table-wrap"><div class="status"><div class="icon">⏳</div>Loading data…</div></div>
  </div>

  <div class="tab-content" id="tab-africa">
    <p class="slabel" id="africa-label"></p>
    <div class="card" id="africa-table-wrap"><div class="status"><div class="icon">⏳</div>Loading data…</div></div>
  </div>

  <div class="tab-content" id="tab-snap">
    <p class="slabel">Snapshot — Global comparative rankings</p>
    <div id="snap-wrap"><div class="status"><div class="icon">⏳</div>Loading data…</div></div>
  </div>

  <div class="footer" id="footer-txt"></div>

</div>

<script src="data.js"></script>
<script>
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

function varClass(v) {
  if (!v) return 'neu';
  const s = v.trim();
  if (s.startsWith('+')) return 'pos';
  if (s.startsWith('−') || s.startsWith('-')) return 'neg';
  return 'neu';
}

function buildGlobalTable(rows) {
  return `<table>
    <thead><tr>
      <th>#</th><th>Company</th><th>Price</th><th>Prev. week</th><th>Change</th><th>Recent development</th>
    </tr></thead>
    <tbody>${rows.map((r,i) => `<tr>
      <td><span class="rank">${i+1}</span></td>
      <td>
        <div class="co-name">${r.name}</div>
        <div class="co-sector">${r.sector}</div>
        <div class="co-mcap">${r.mcap}</div>
      </td>
      <td><div class="price-val">${r.price}</div><div class="exch">${r.currency} · ${r.exchange}</div></td>
      <td><div class="prev">${r.prev_price}</div></td>
      <td><span class="${varClass(r.variation)}">${r.variation}</span></td>
      <td><div class="news-txt">${r.news}</div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function buildAfricaTable(rows) {
  return `<table>
    <thead><tr>
      <th>#</th><th>Company</th><th>Price</th><th>Prev. week</th><th>Change</th><th>Recent development</th>
    </tr></thead>
    <tbody>${rows.map((r,i) => `<tr>
      <td><span class="rank">${i+1}</span></td>
      <td>
        <div class="co-name">${r.name} <span style="font-size:10px;color:var(--text3)">${r.ticker || ''}</span></div>
        <div class="co-sector">${r.sector}</div>
        ${r.exchange === 'BRVM' ? '<div><span class="brvm-pill">BRVM</span></div>' : ''}
      </td>
      <td><div class="price-val">${r.price}</div><div class="exch">${r.currency} · ${r.exchange}</div></td>
      <td><div class="prev">${r.prev_price}</div></td>
      <td><span class="${varClass(r.variation)}">${r.variation}</span></td>
      <td><div class="news-txt">${r.news}</div></td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function buildSnapshot(snap) {
  const sections = [
    { key: 'by_market_cap', label: 'By market cap' },
    { key: 'by_revenue',    label: 'By revenue (FY latest)' },
    { key: 'by_net_income', label: 'By net income (FY latest)' }
  ];
  return `<div class="snap-grid">${sections.map(s => `
    <div class="snap-card">
      <div class="snap-card-title">${s.label}</div>
      ${(snap[s.key] || []).map((it, i) => `
        <div class="snap-row">
          <span class="snap-n">${i+1}</span>
          <span class="snap-co">${it.name}</span>
          <span class="snap-val">${it.value}</span>
        </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function render() {
  if (typeof MARKETS_DATA === 'undefined') {
    document.getElementById('global-table-wrap').innerHTML = '<div class="status"><div class="icon">⚠️</div>data.js not found. Please upload it to your repository.</div>';
    return;
  }
  const d = MARKETS_DATA;
  document.getElementById('week-label').textContent = 'Week of ' + d.week;
  document.getElementById('global-label').textContent = 'Top 5 — Global market capitalisation · ' + d.data_date;
  document.getElementById('africa-label').textContent = 'Top 5 — African market capitalisation · BRVM priority · ' + d.data_date;
  document.getElementById('global-table-wrap').innerHTML  = buildGlobalTable(d.global);
  document.getElementById('africa-table-wrap').innerHTML  = buildAfricaTable(d.africa);
  document.getElementById('snap-wrap').innerHTML          = buildSnapshot(d.snapshot);
  document.getElementById('footer-txt').innerHTML =
    `Updated <strong>${d.week}</strong> · Sources: ${d.sources} · Refresh: ask Claude each Monday`;
}

render();
</script>
</body>
</html>
